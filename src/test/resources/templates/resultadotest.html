<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Consulta</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #007bff;
        }
        h1 {
            color: #0056b3;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .error-message {
            color: #d9534f;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .info-card {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-bottom: 20px;
        }
        .info-card p {
            margin: 8px 0;
            font-size: 1.1em;
            line-height: 1.5;
        }
        .info-card strong {
            color: #007bff;
        }
        a.button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }
        a.button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        a.button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Resultado da Consulta</h1>

    <div th:if="${erro}" class="error-message">
        <p th:text="${erro}"></p>
    </div>

    <div th:if="${cepData}" class="info-card">
        <p><strong>CEP:</strong> <span th:text="${cepData.cep}"></span></p>
        <p><strong>Logradouro:</strong> <span th:text="${cepData.logradouro}"></span></p>
        <p><strong>Complemento:</strong> <span th:text="${cepData.complemento}"></span></p>
        <p><strong>Bairro:</strong> <span th:text="${cepData.bairro}"></span></p>
        <p><strong>Localidade:</strong> <span th:text="${cepData.localidade}"></span></p>
        <p><strong>UF:</strong> <span th:text="${cepData.uf}"></span></p>
    </div>

    <a th:href="@{/}" class="button">Nova Consulta</a>
</div>
</body>
</html>
